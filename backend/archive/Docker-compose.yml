version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: stonks-postgres
    restart: always
    environment:
      POSTGRES_USER: stonks
      POSTGRES_PASSWORD: stonks123
      POSTGRES_DB: auth_db
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql

volumes:
  postgres_data: