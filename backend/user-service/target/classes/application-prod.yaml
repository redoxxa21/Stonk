spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5444/auth_db}
    username: ${DB_USERNAME:stonks}
    password: ${DB_PASSWORD:stonks123}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    service-registry:
      auto-registration:
        enabled: true

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
