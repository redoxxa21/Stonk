version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: stonks-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stonks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stonks123}
      POSTGRES_DB: ${POSTGRES_DB:-stonks}
    ports:
      - "${POSTGRES_PORT:-5444}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stonks}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: