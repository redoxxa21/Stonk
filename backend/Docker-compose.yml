version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: stonks-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stonks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stonks123}
      POSTGRES_DB: ${POSTGRES_DB:-stonks}
    ports:
      - "${POSTGRES_PORT:-5444}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stonks}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stonks_net

  eureka-server:
    build:
      context: ./eureka-server
    container_name: stonks-eureka
    ports:
      - "8761:8761"
    environment:
      - EUREKA_HOSTNAME=eureka-server
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8761/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - stonks_net

  api-gateway:
    build:
      context: ./api-gateway
    container_name: stonks-api-gateway
    ports:
      - "8081:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - stonks_net

  frontend:
    build:
      context: ../frontend
    container_name: stonks-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      - API_GATEWAY_URL=http://api-gateway:8080
    depends_on:
      - api-gateway
    networks:
      - stonks_net

  auth-service:
    build:
      context: ./auth-service
    container_name: stonks-auth
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/auth_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - APP_ADMIN_SEED_ENABLED=true
      - APP_ADMIN_SEED_USERNAME=admin
      - APP_ADMIN_SEED_EMAIL=admin@stonk.local
      - APP_ADMIN_SEED_PASSWORD=Admin@123
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - stonks_net

  wallet-service:
    build:
      context: ./wallet-service
    container_name: stonks-wallet
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/wallet_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - KAFKA_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - stonks_net

  market-data-service:
    build:
      context: ./market-data-service
    container_name: stonks-market-data
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/market_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - KAFKA_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - stonks_net

  order-service:
    build:
      context: ./order-service
    container_name: stonks-order
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - KAFKA_URL=kafka:9092
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - stonks_net

  market-simulation-service:
    build:
      context: ./market-simulation-service
    container_name: stonks-market-sim
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - KAFKA_URL=kafka:9092
    depends_on:
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - stonks_net

  portfolio-service:
    build:
      context: ./portfolio-service
    container_name: stonks-portfolio
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/portfolio_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - KAFKA_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - stonks_net

  trading-service:
    build:
      context: ./trading-service
    container_name: stonks-trading
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/trading_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - KAFKA_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - stonks_net

  audit-log-service:
    build:
      context: ./audit-log-service
    container_name: stonks-audit-log
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/audit_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - KAFKA_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - stonks_net

  kafka:
    image: apache/kafka:3.7.0
    container_name: stonks-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - stonks_net

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: stonks-kafdrop
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      JVM_OPTS: "-Xms32M -Xmx64M"
      SERVER_SERVLET_CONTEXTPATH: "/"
    depends_on:
      kafka:
        condition: service_started
    networks:
      - stonks_net

volumes:
  postgres_data:

networks:
  stonks_net:
    driver: bridge
