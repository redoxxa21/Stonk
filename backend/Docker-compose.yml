version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: stonks-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stonks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stonks123}
      POSTGRES_DB: ${POSTGRES_DB:-stonks}
    ports:
      - "${POSTGRES_PORT:-5444}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stonks}"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: ./eureka-server
    container_name: stonks-eureka
    ports:
      - "8761:8761"
    environment:
      - EUREKA_HOSTNAME=eureka-server
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./api-gateway
    container_name: stonks-api-gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
    depends_on:
      eureka-server:
        condition: service_healthy

  auth-service:
    build:
      context: ./auth-service
    container_name: stonks-auth
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/auth_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  user-service:
    build:
      context: ./user-service
    container_name: stonks-user
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/user_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  wallet-service:
    build:
      context: ./wallet-service
    container_name: stonks-wallet
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/wallet_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  market-data-service:
    build:
      context: ./market-data-service
    container_name: stonks-market-data
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/market_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  order-service:
    build:
      context: ./order-service
    container_name: stonks-order
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/order_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  portfolio-service:
