version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: stonks-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stonks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stonks123}
      POSTGRES_DB: ${POSTGRES_DB:-stonks}
    ports:
      - "${POSTGRES_PORT:-5444}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stonks}"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: ./eureka-server
    container_name: stonks-eureka
    ports:
      - "8761:8761"
    environment:
      - EUREKA_HOSTNAME=eureka-server
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  api-gateway:
    build:
      context: ./api-gateway
    container_name: stonks-api-gateway
    ports:
      - "8081:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
    depends_on:
      eureka-server:
        condition: service_healthy

  auth-service:
    build:
      context: ./auth-service
    container_name: stonks-auth
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/auth_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started

  user-service:
    build:
      context: ./user-service
    container_name: stonks-user
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/user_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started

  wallet-service:
    build:
      context: ./wallet-service
    container_name: stonks-wallet
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/wallet_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - USER_SERVICE_URL=http://stonks-user:2700
      - KAFKA_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started

  market-data-service:
    build:
      context: ./market-data-service
    container_name: stonks-market-data
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/market_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy

  order-service:
    build:
      context: ./order-service
    container_name: stonks-order
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/order_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - USER_SERVICE_URL=http://stonks-user:2700
      - KAFKA_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started

  portfolio-service:
    build:
      context: ./portfolio-service
    container_name: stonks-portfolio
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/portfolio_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - USER_SERVICE_URL=http://stonks-user:2700
      - KAFKA_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started

  trading-service:
    build:
      context: ./trading-service
    container_name: stonks-trading
    environment:
      - DB_URL=jdbc:postgresql://stonks-postgres:5432/trading_db
      - DB_USERNAME=stonks
      - DB_PASSWORD=stonks123
      - DB_DRIVER_CLASS_NAME=org.postgresql.Driver
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka
      - SERVICE_REGISTRY_AUTO_REGISTRATION_ENABLED=true
      - EUREKA_FETCH_REGISTRY=true
      - EUREKA_REGISTER_WITH_EUREKA=true
      - KAFKA_URL=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_started

  kafka:
    image: apache/kafka:3.7.0
    container_name: stonks-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
volumes:
  postgres_data: