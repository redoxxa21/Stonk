spring:
  application:
    name: market-data-service

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    consumer:
      group-id: market-data-service-group

  datasource:
    url: jdbc:h2:mem:market_test_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop

eureka:
  client:
    enabled: false

jwt:
  secret-key: testsecretkeytestsecretkeytestsecretkey12
